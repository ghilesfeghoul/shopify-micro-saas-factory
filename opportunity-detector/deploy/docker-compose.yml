# ╔══════════════════════════════════════════════════════════════════╗
# ║  docker-compose.yml                                              ║
# ║                                                                   ║
# ║  Full local stack:                                               ║
# ║  - n8n (workflow engine)                                         ║
# ║  - PostgreSQL (n8n storage, more reliable than SQLite for n8n)  ║
# ║  - Detector API (built from ./)                                  ║
# ║  - Caddy (reverse proxy with HTTPS for both)                     ║
# ║                                                                   ║
# ║  All services on the same Docker network — n8n calls the        ║
# ║  detector via its container name (no public exposure).          ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # ─── PostgreSQL for n8n ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: msf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - msf-network

  # ─── n8n workflow engine ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: msf-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Auth (set strong values in .env)
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}

      # Encryption
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # URLs (must match Caddy hostname)
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST}/

      # Behavior
      GENERIC_TIMEZONE: Europe/Paris
      EXECUTIONS_DATA_PRUNE: 'true'
      EXECUTIONS_DATA_MAX_AGE: 168 # 7 days
      N8N_LOG_LEVEL: info

      # Pass-through to workflows: detector secret
      DETECTOR_HMAC_SECRET: ${DETECTOR_HMAC_SECRET}
      DETECTOR_URL: http://detector:3000
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - msf-network

  # ─── Opportunity Detector API ──────────────────────────────────
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: msf-detector
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/detector.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-opus-4-7
      HMAC_SECRET: ${DETECTOR_HMAC_SECRET}

      # Inside Docker network, only n8n container can reach us
      # The Docker bridge IP range is 172.16.0.0/12
      IP_ALLOWLIST: 172.16.0.0/12,127.0.0.1
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      MAX_SIGNALS_PER_SCAN: 200
      MAX_OPPORTUNITIES_PER_SCAN: 15
      MIN_SCORE_THRESHOLD: 25
    volumes:
      - detector_data:/data
      - detector_logs:/app/logs
    networks:
      - msf-network
    # NOT exposed externally — only reachable via Caddy or n8n container
    expose:
      - '3000'

  # ─── Caddy reverse proxy ───────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: msf-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - msf-network
    depends_on:
      - n8n

volumes:
  postgres_data:
  n8n_data:
  detector_data:
  detector_logs:
  caddy_data:
  caddy_config:

networks:
  msf-network:
    driver: bridge
